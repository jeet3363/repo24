name: 'Terraform Deploy'

on:
  push:
    branches:
      - "main"

jobs:
  terraform_workflow:    # Job ke naam me space nahi ho sakta, isliye underscore (_) lagaya hai
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4  # 'action/checkout' nahi 'actions/checkout' hota hai (s plural)

      - name: Hashicorp - Setup Terraform
        uses: hashicorp/setup-terraform@v3 # Updated to stable version
        with:
          terraform_version: "1.5.7" # Version specify karna best practice hai

      - name: Terraform Init, Validate, Plan & Apply
        run: |
          terraform init
          terraform validate    # 'validation' nahi, sahi command 'validate' hoti hai
          terraform plan
          terraform apply -auto-approve # single dash (-) ki jagah double dash (--) hota hai auto-approve me


    